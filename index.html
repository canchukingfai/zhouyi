<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 周易小精灵占卜 🐱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            padding: 20px;
            color: #5a4a4a;
        }
        
        .container { max-width: 420px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 24px; }
        
        .logo { font-size: 72px; animation: bounce 2s infinite; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 { font-size: 26px; color: #ff6b9d; text-shadow: 2px 2px 0 #fff; margin: 12px 0; }
        .subtitle { color: #999; font-size: 14px; }
        
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.15);
            margin-bottom: 20px;
        }
        
        .question-label { font-size: 18px; color: #ff6b9d; margin-bottom: 16px; text-align: center; }
        
        .question-input {
            width: 100%;
            padding: 16px 20px;
            border: 3px solid #ffd1dc;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }
        
        .question-input:focus { border-color: #ff6b9d; box-shadow: 0 0 20px rgba(255, 107, 157, 0.2); }
        
        .input-section { display: flex; gap: 8px; margin: 20px 0; }
        
        .input-wrapper { flex: 1; text-align: center; }
        
        .input-wrapper label { display: block; font-size: 12px; color: #ff6b9d; margin-bottom: 8px; font-weight: bold; }
        
        .input-wrapper input {
            width: 100%;
            padding: 12px;
            border: 3px solid #ffd1dc;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }
        
        .input-wrapper input:focus { border-color: #ff6b9d; }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #ffa3c4);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 107, 157, 0.5); }
        
        .btn-secondary { background: linear-gradient(135deg, #a8edea, #fed6e3); color: #ff6b9d; }
        
        .ai-section { margin-top: 16px; }
        
        .ai-label { font-size: 14px; color: #999; text-align: center; margin-bottom: 12px; }
        
        .ai-buttons { display: flex; gap: 8px; }
        
        .btn-ai {
            flex: 1;
            padding: 14px 8px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: white;
        }
        
        .btn-doubao { background: linear-gradient(135deg, #ff6b6b, #ffa500); }
        .btn-kimi { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .btn-merlin { background: linear-gradient(135deg, #667eea, #764ba2); }
        
        .btn-ai:hover { transform: translateY(-2px); }
        
        .result { display: none; animation: slideUp 0.5s ease; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .gua-display {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #fff5f5, #fff);
            border-radius: 20px;
            margin-bottom: 16px;
        }
        
        .gua-symbols { font-size: 56px; margin-bottom: 12px; letter-spacing: 8px; }
        .gua-name { font-size: 24px; color: #ff6b9d; font-weight: bold; margin-bottom: 8px; }
        .gua-ci { color: #999; font-size: 14px; font-style: italic; }
        
        .fortune-card {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
            border: 2px solid #667eea;
        }
        
        .fortune-header { text-align: center; margin-bottom: 12px; }
        .fortune-title { font-size: 16px; color: #667eea; font-weight: bold; }
        
        .fortune-content {
            background: #fff;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            line-height: 1.8;
            color: #666;
            white-space: pre-wrap;
        }
        
        .copy-btn {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .disclaimer { text-align: center; font-size: 12px; color: #bbb; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🐱</div>
            <h1>周易小精灵占卜</h1>
            <p class="subtitle">用心提问，答案自会出现 ✨</p>
        </div>
        
        <div class="card question-box">
            <div class="question-label">💭 你想问什么？</div>
            <input type="text" class="question-input" id="question" placeholder="例如：今日工作顺利吗？">
        </div>
        
        <div class="card">
            <div class="input-section">
                <div class="input-wrapper">
                    <label>上卦 ☰</label>
                    <input type="number" id="shang" min="1" max="8" placeholder="1-8">
                </div>
                <div class="input-wrapper">
                    <label>下卦 ☷</label>
                    <input type="number" id="xia" min="1" max="8" placeholder="1-8">
                </div>
                <div class="input-wrapper">
                    <label>动爻 ⚡</label>
                    <input type="number" id="dongyao" min="1" max="6" placeholder="1-6">
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="showResult()">🔮 开始占卜</button>
            <button class="btn btn-secondary" onclick="randomNumbers()">🎲 随机生成</button>
        </div>
        
        <div class="card result" id="result">
            <div class="gua-display">
                <div class="gua-symbols" id="guaSymbols"></div>
                <div class="gua-name" id="guaName"></div>
                <div class="gua-ci" id="guaCi"></div>
            </div>
            
            <div class="ai-section">
                <p class="ai-label">🤖 搵AI帮你解读：</p>
                <div class="ai-buttons">
                    <button class="btn-ai btn-doubao" onclick="openDoubao()">
                        <span>🫛</span> 豆包
                    </button>
                    <button class="btn-ai btn-kimi" onclick="openKimi()">
                        <span>🌙</span> Kimi
                    </button>
                    <button class="btn-ai btn-merlin" onclick="generateLocal()">
                        <span>🧙</span> 解读
                    </button>
                </div>
            </div>
            
            <div id="fortuneCard"></div>
        </div>
        
        <p class="disclaimer">卦象仅供参考<br>一切决定权在你手中 🐱</p>
    </div>
    
    <script>
        let currentResult = {};
        
        const BAGUA = {
            1: { symbol: "☰", name: "乾", meaning: "天" },
            2: { symbol: "☱", name: "兑", meaning: "泽" },
            3: { symbol: "☲", name: "离", meaning: "火" },
            4: { symbol: "☳", name: "震", meaning: "雷" },
            5: { symbol: "☴", name: "巽", meaning: "风" },
            6: { symbol: "☵", name: "坎", meaning: "水" },
            7: { symbol: "☶", name: "艮", meaning: "山" },
            8: { symbol: "☷", name: "坤", meaning: "地" }
        };

        const GUAXIANG = {
            "1,1": { name: "乾为天", ci: "元亨利贞" },
            "1,8": { name: "天地否", ci: "否之匪人" },
            "3,5": { name: "火风鼎", ci: "元吉" },
            "8,5": { name: "地风升", ci: "元亨" },
            "5,3": { name: "风火家人", ci: "利女贞" }
        };

        function randomNumbers() {
            document.getElementById('shang').value = Math.floor(Math.random() * 8) + 1;
            document.getElementById('xia').value = Math.floor(Math.random() * 8) + 1;
            document.getElementById('dongyao').value = Math.floor(Math.random() * 6) + 1;
        }

        function showResult() {
            const question = document.getElementById('question').value.trim();
            const shang = parseInt(document.getElementById('shang').value);
            const xia = parseInt(document.getElementById('xia').value);
            const dongyao = parseInt(document.getElementById('dongyao').value);
            
            if (!question) { alert("💭 请先输入你的问题~"); return; }
            if (!shang || !xia || !dongyao) { alert("🔢 请输入三个数字~"); return; }
            if (shang < 1 || shang > 8 || xia < 1 || xia > 8 || dongyao < 1 || dongyao > 6) {
                alert("📝 数字范围：上卦1-8，下卦1-8，动爻1-6"); return;
            }
            
            const shangGua = BAGUA[shang];
            const xiaGua = BAGUA[xia];
            const guaKey = `${shang},${xia}`;
            const gua = GUAXIANG[guaKey] || { name: `${shangGua.name}${xiaGua.name}卦`, ci: "卦象已现" };
            
            currentResult = { question, shang, xia, dongyao, shangGua, xiaGua, gua };
            
            document.getElementById('guaSymbols').textContent = shangGua.symbol + xiaGua.symbol;
            document.getElementById('guaName').textContent = gua.name;
            document.getElementById('guaCi').textContent = gua.ci;
            document.getElementById('fortuneCard').innerHTML = '';
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        function buildPrompt() {
            const { question, shangGua, xiaGua, gua, dongyao } = currentResult;
            return `我的问题是：${question}\n\n卦象：\n- 上卦：${shangGua.name}（${shangGua.meaning}）\n- 下卦：${xiaGua.name}（${xiaGua.meaning}）\n- 卦名：${gua.name}\n- 卦辞：${gua.ci}\n- 动爻：第${dongyao}爻\n\n请解读：1.卦象含义 2.动爻解读 3.对问题的建议`;
        }

        function openDoubao() {
            if (!currentResult.question) { alert("💭 请先输入问题并占卜~"); return; }
            window.open(`https://www.doubao.com/chat/?prompt=${encodeURIComponent(buildPrompt())}`, '_blank');
        }

        function openKimi() {
            if (!currentResult.question) { alert("💭 请先输入问题并占卜~"); return; }
            window.open(`https://kimi.moonshot.cn/?prompt=${encodeURIComponent(buildPrompt())}`, '_blank');
        }

        function generateLocal() {
            if (!currentResult.question) { alert("💭 请先输入问题并占卜~"); return; }
            
            const { question, shangGua, xiaGua, gua, dongyao } = currentResult;
            
            const dongyaoMeanings = {
                1: "初爻动——事情既开始，变动既萌芽阶段。宜把握时机，主动出击！",
                2: "二爻动——事情既发展，人际关系既变化。要注意同身边人既相处。",
                3: "三爻动——事情既转折点。要谨慎，三思而后行，唔好冲动。",
                4: "四爻动——环境既变化。灵活变通，适应新既情况。",
                5: "五爻动——事情既关键点，决定性既时刻。把握机会，做出抉择。",
                6: "上爻动——事情既结束或新既开始。总结经验，准备新一轮既开始。"
            };
            
            const advice = {
                1: "🎯 今日冲劲十足，有咩想做就趁今日啦！",
                2: "今日稳打稳扎，循序渐进咁推进就最好啦。",
                3: "今日要审时度势，三思而后行，唔好冲动呀！",
                4: "今日几灵活变通，逆境都可以转化为机遇。",
                5: "今日系关键日，做出既决定会影响成件事！",
                6: "今日适合总结复盘，为下一步做好准备。"
            };
            
            const today = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
            
            const html = `
                <div class="fortune-card">
                    <div class="fortune-header">
                        <div class="fortune-title">📖 今日运势解读 - ${today}</div>
                    </div>
                    <div class="fortune-content">
<b>问题：</b>${question}

<b>卦象：</b>${gua.name} — ${gua.ci}

<b>上卦：</b>${shangGua.name}（${shangGua.meaning}）
<b>下卦：</b>${xiaGua.name}（${xiaGua.meaning}）
<b>动爻：</b>第${dongyao}爻

<b>📝 动爻解读：</b>
${dongyaoMeanings[dongyao]}

<b>💡 今日建议：</b>
${advice[dongyao]}

---
🐱 记住：卦象只系参考，你既选择先系最紧要！
                    </div>
                    <button class="copy-btn" onclick="copyResult()">📋 复制结果</button>
                </div>
            `;
            
            document.getElementById('fortuneCard').innerHTML = html;
        }

        function copyResult() {
            const { question, shangGua, xiaGua, gua, dongyao } = currentResult;
            
            const dongyaoMeanings = {
                1: "初爻动——事情既开始，变动既萌芽阶段。宜把握时机，主动出击！",
                2: "二爻动——事情既发展，人际关系既变化。要注意同身边人既相处。",
                3: "三爻动——事情既转折点。要谨慎，三思而后行，唔好冲动。",
                4: "四爻动——环境既变化。灵活变通，适应新既情况。",
                5: "五爻动——事情既关键点，决定性既时刻。把握机会，做出抉择。",
                6: "上爻动——事情既结束或新既开始。总结经验，准备新一轮既开始。"
            };
            
            const advice = {
                1: "🎯 今日冲劲十足，有咩想做就趁今日啦！",
                2: "今日稳打稳扎，循序渐进咁推进就最好啦。",
                3: "今日要审时度势，三思而后行，唔好冲动呀！",
                4: "今日几灵活变通，逆境都可以转化为机遇。",
                5: "今日系关键日，做出既决定会影响成件事！",
                6: "今日适合总结复盘，为下一步做好准备。"
            };
            
            const text = `【周易运势】\n问题：${question}\n\n卦象：${gua.name} — ${gua.ci}\n上卦：${shangGua.name}（${shangGua.meaning}）\n下卦：${xiaGua.name}（${xiaGua.meaning}）\n动爻：第${dongyao}爻\n\n📝 动爻解读：${dongyaoMeanings[dongyao]}\n\n💡 今日建议：${advice[dongyao]}\n\n🐱 记住：卦象只系参考，你既选择先系最紧要！`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert("✅ 已复制到剪贴板！");
            });
        }
    </script>
</body>
</html>
